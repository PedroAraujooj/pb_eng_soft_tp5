name: Quality - Static Analysis and SAST

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Rodar Checkstyle
        run: |
          echo "::group::Checkstyle"
          mvn -B checkstyle:checkstyle checkstyle:check
          echo "::endgroup::"

      - name: Publicar relatório do Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/site/checkstyle.html
          retention-days: 7
          if-no-files-found: warn

      - name: Resumo do Checkstyle
        if: always()
        run: |
          echo "## Resultado do Checkstyle" >> $GITHUB_STEP_SUMMARY
          echo "- Validação de padrão e estilo executada" >> $GITHUB_STEP_SUMMARY
          echo "- Relatório publicado como artifact" >> $GITHUB_STEP_SUMMARY

  codeql:
    name: CodeQL - SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-extended,security-and-quality

      - name: Configurar JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build para análise
        run: mvn -B -DskipTests clean compile

      - name: Analisar com CodeQL
        uses: github/codeql-action/analyze@v3

      - name: Resumo do CodeQL
        if: always()
        run: |
          echo "## Resultado do SAST" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL executado para Java/Kotlin" >> $GITHUB_STEP_SUMMARY
          echo "- Alertas disponíveis na aba Security do repositório" >> $GITHUB_STEP_SUMMARY