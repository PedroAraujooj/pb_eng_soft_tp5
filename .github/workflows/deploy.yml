name: CD - Deploy Multi Environment

on:
  push:
    branches: [ "main", "develop" ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  package:
    name: Package Application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Gerar artefato
        run: mvn -B clean package -DskipTests

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 7
          if-no-files-found: error

  deploy-dev:
    name: Deploy DEV
    if: github.ref == 'refs/heads/develop'
    needs: package
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v5
        with:
          name: application-jar
          path: target

      - name: Deploy simulado DEV
        run: |
          mkdir -p deployed/dev
          cp target/*.jar deployed/dev/app.jar
          echo "Deploy DEV simulado com sucesso"

      - name: Resumo DEV
        run: |
          echo "## Deploy DEV" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy simulado realizado com artifact Maven" >> $GITHUB_STEP_SUMMARY
          echo "- Ambiente: dev" >> $GITHUB_STEP_SUMMARY

  deploy-test:
    name: Deploy TEST
    if: github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: package
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Baixar artefato
        uses: actions/download-artifact@v5
        with:
          name: application-jar
          path: target

      - name: Subir aplicação localmente
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          echo $! > app.pid

      - name: Aguardar aplicação responder
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/v1/conta > /dev/null; then
              echo "Aplicação respondeu com sucesso"
              exit 0
            fi

            if ! kill -0 "$(cat app.pid)" 2>/dev/null; then
              echo "Aplicação caiu durante a inicialização"
              cat app.log
              exit 1
            fi

            echo "Aguardando aplicação subir... tentativa $i"
            sleep 2
          done

          echo "Timeout aguardando aplicação em localhost:8080"
          cat app.log
          exit 1

      - name: Smoke test
        run: curl -fsS http://127.0.0.1:8080/v1/conta

      - name: Publicar logs da aplicação
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-app-logs
          path: app.log
          if-no-files-found: warn

      - name: Resumo TEST
        if: always()
        run: |
          echo "## Deploy TEST" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy simulado realizado" >> $GITHUB_STEP_SUMMARY
          echo "- Aplicação iniciada localmente no runner" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke test executado em http://localhost:8080/v1/conta" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy PROD
    needs: deploy-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v5
        with:
          name: application-jar
          path: target

      - name: Deploy simulado PROD
        run: |
          mkdir -p deployed/prod
          cp target/*.jar deployed/prod/app.jar
          echo "Deploy PROD simulado com sucesso"

      - name: Resumo PROD
        run: |
          echo "## Deploy PROD" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy simulado realizado" >> $GITHUB_STEP_SUMMARY
          echo "- Aprovação manual controlada pelo environment 'prod'" >> $GITHUB_STEP_SUMMARY