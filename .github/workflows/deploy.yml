name: CD - Deploy Multi Environment

on:
  push:
    branches: [ "main", "develop" ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  package:
    name: Package Application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Gerar artefato
        run: mvn -B clean package -DskipTests

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 7
          if-no-files-found: error

  deploy-dev:
    name: Deploy DEV
    if: github.ref == 'refs/heads/develop'
    needs: package
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v5
        with:
          name: application-jar
          path: target

      - name: Deploy simulado DEV
        run: |
          mkdir -p deployed/dev
          cp target/*.jar deployed/dev/app.jar
          echo "Deploy DEV simulado com sucesso"

      - name: Resumo DEV
        run: |
          echo "## Deploy DEV" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy simulado realizado com artifact Maven" >> $GITHUB_STEP_SUMMARY
          echo "- Ambiente: dev" >> $GITHUB_STEP_SUMMARY

  deploy-test:
    name: Deploy TEST
    if: github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: package
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v5
        with:
          name: application-jar
          path: target

      - name: Deploy simulado TEST
        run: |
          mkdir -p deployed/test
          cp target/*.jar deployed/test/app.jar
          echo "Deploy TEST simulado com sucesso"

      - name: Subir aplicação localmente
        run: |
          nohup java -jar deployed/test/app.jar > app.log 2>&1 &
          echo $! > app.pid
          sleep 20

      - name: Smoke test
        run: |
          curl -f http://localhost:8080/v1/conta

      - name: Publicar logs da aplicação
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-app-logs
          path: app.log
          if-no-files-found: warn

      - name: Resumo TEST
        if: always()
        run: |
          echo "## Deploy TEST" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy simulado realizado" >> $GITHUB_STEP_SUMMARY
          echo "- Aplicação iniciada localmente no runner" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke test executado em http://localhost:8080/v1/conta" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy PROD
    needs: deploy-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v5
        with:
          name: application-jar
          path: target

      - name: Deploy simulado PROD
        run: |
          mkdir -p deployed/prod
          cp target/*.jar deployed/prod/app.jar
          echo "Deploy PROD simulado com sucesso"

      - name: Resumo PROD
        run: |
          echo "## Deploy PROD" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy simulado realizado" >> $GITHUB_STEP_SUMMARY
          echo "- Aprovação manual controlada pelo environment 'prod'" >> $GITHUB_STEP_SUMMARY